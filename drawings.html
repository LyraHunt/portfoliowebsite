<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawings</title>

    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/drawings.css">
</head>
<body>
    <div class="flex-column">
        <div id="headerContainer" style="margin-bottom: 60px;"></div>

        <h1>DRAWINGS</h1>
        <h2>(Traditional and Digital)</h2>
        <br>

        <div id="drawingsContainer"></div>

        <div id="footerContainer" style="margin-top: 60px;"></div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <div id="lightboxImgContainer">
            <span class="lightboxNav" onclick="changeLightboxImg(-1); event.stopPropagation()">&lt;</span>
            <div style="height: 100%; width: calc(100% - 20vw); align-items: center; justify-content: center; display: flex;">
                <div style="height: 100%; width: 100%; align-items: center; justify-content: center; display: flex;">
                    <img src="drawings/images/MOW-white-background.png" id="lightboxImg" onclick="event.stopPropagation()">
                </div>
            </div>
            <span class="lightboxNav" onclick="changeLightboxImg(1); event.stopPropagation()">&gt;</span>
        </div>
        <span id="lightboxClose" onclick="closeLightbox(); event.stopPropagation()">&times;</span>
    </div>
    
    <script src="general_javascripts/math.js"></script>
    <script src="general_javascripts/input.js"></script>
    <script src="drawings/drawings_data.js"></script>
    <script src="drawings/drawings.js"></script>

    <script src="general_javascripts/header_n_footer.js"></script>
</body>
</html>
